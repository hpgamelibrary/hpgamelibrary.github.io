<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPGameLibrary - Socials</title>
  
  <!-- Orbitron Font Import -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0000; 
      color: #c5c6c7; 
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    /* Navigation Bar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5vw;
      background: rgba(10, 0, 0, 0.95);
      border-bottom: 2px solid #ff2a2a; 
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      color: #ff2a2a; 
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 42, 42, 0.5);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    nav a {
      color: #c5c6c7;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ff2a2a;
    }

    /* Hero Section / Socials Layout */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #2a0000 0%, #0a0000 80%);
      position: relative;
      padding-top: 100px; /* Space for fixed header */
    }

    /* Background decorative grid */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 42, 42, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 42, 42, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Profile Styles */
    .profile-pic {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #ff2a2a;
      box-shadow: 0 0 20px rgba(255, 42, 42, 0.6);
      margin-bottom: 20px;
      object-fit: cover;
    }

    .hero h1 {
      font-size: 2.5rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #ff2a2a;
    }

    .hero p {
      font-size: 1.2rem;
      color: #ff6666;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    /* Social Links Container */
    .social-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    /* The Social Buttons (Adapted from Explore Button) */
    .social-btn {
      display: block;
      width: 100%;
      padding: 15px 20px;
      font-size: 1.2rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      color: #0a0000;
      background-color: #ff2a2a;
      border: 2px solid #ff2a2a;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 0 15px rgba(255, 42, 42, 0.6);
      position: relative;
      overflow: hidden;
    }

    /* Button Hover Effects */
    .social-btn:hover {
      background-color: transparent;
      color: #ff2a2a;
      box-shadow: 0 0 25px rgba(255, 42, 42, 0.9), 0 0 50px rgba(255, 42, 42, 0.4) inset;
      transform: translateY(-3px) scale(1.05);
    }

    .social-btn:active {
      transform: translateY(2px) scale(0.98);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .hero p { font-size: 1rem; }
      nav ul { display: none; }
      .hero-content { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">HPGameLibrary</div>
    <nav>
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/support">Support</a></li>
        <li><a href="/game-request.html">Request game</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <div class="hero-content">
      <!-- Replace the src with your actual profile image link -->
      <img src="https://yt3.googleusercontent.com/d7mwFIoD6gS_sh2RtpmiSPpXm6D0NVWg4A-aFRx1P24Pkq9aqdVU5Zy_oDW6mrOYmC-j7tMCXg=s160-c-k-c0x00ffffff-no-rj" alt="Profile Picture" class="profile-pic">
      
      <h1>HPGameLibrary</h1>
      <p>Socials</p>
      
      <div class="social-links">
        <a href="./instagram" class="social-btn">Instagram - @hpgamelibrary</a>
        <a href="./youtube" class="social-btn">YouTube - @HPGameLibrary</a>
      </div>
    </div>
  </main>

</body>
</html>
