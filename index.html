<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPGameLibrary</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0000; /* Deep dark red-black background */
      color: #c5c6c7; /* Light grey text */
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    /* Navigation Bar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5vw;
      background: rgba(10, 0, 0, 0.95);
      border-bottom: 2px solid #ff2a2a; /* Neon Red */
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      color: #ff2a2a; /* Neon Red */
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 42, 42, 0.5);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    nav a {
      color: #c5c6c7;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ff2a2a;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #2a0000 0%, #0a0000 80%);
      position: relative;
    }

    /* Background decorative grid */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 42, 42, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 42, 42, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: 5rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #ff2a2a, 0 0 40px #aa0000;
    }

    .hero p {
      font-size: 1.5rem;
      color: #ff6666;
      margin-bottom: 50px;
      letter-spacing: 2px;
    }

    /* The "Explore" Button */
    .explore-btn {
      display: inline-block;
      padding: 18px 50px;
      font-size: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      color: #0a0000;
      background-color: #ff2a2a;
      border: 2px solid #ff2a2a;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 0 15px rgba(255, 42, 42, 0.6);
      position: relative;
      overflow: hidden;
    }

    /* Button Hover Effects */
    .explore-btn:hover {
      background-color: transparent;
      color: #ff2a2a;
      box-shadow: 0 0 25px rgba(255, 42, 42, 0.9), 0 0 50px rgba(255, 42, 42, 0.4) inset;
      transform: translateY(-3px) scale(1.05);
    }

    .explore-btn:active {
      transform: translateY(2px) scale(0.98);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .hero h1 { font-size: 3rem; }
      .hero p { font-size: 1rem; }
      nav ul { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">HPGameLibrary</div>
    <nav>
      <ul>
        <li><a href="./socials/">Socials</a></li>
        <li><a href="/support">Support</a></li>
        <li><a href="/game-request.html">Request game</a></li>
        <li><a href="./emails.txt"></a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <div class="hero-content">
      <h1>HPGameLibrary</h1>
      <p>Small, but safe and working library of cracked games.</p>
      
      <a href="/catalog.html" class="explore-btn">Explore games</a>
    </div>
  </main>

</body>
</html>
