<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPGameLibrary: Support</title>
    <style>
        body { 
            font-family: sans-serif; 
            max-width: 400px; 
            margin: 50px auto; 
            padding: 20px; 
            background-color: #0d0d0d; /* Dark background */
            color: #f2f2f2; /* Light text for readability */
        }
        h2 {
            color: #ff3333; /* Red heading */
            border-bottom: 2px solid #ff3333;
            padding-bottom: 10px;
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #ff9999; /* Lighter red for labels */
        }
        input, textarea { 
            width: 100%; 
            padding: 8px; 
            box-sizing: border-box; 
            background-color: #1a1a1a; /* Slightly lighter black for inputs */
            color: #ffffff;
            border: 1px solid #400000; /* Dark red border */
            border-radius: 4px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff3333; /* Bright red focus outline */
            box-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
        }
        button { 
            padding: 10px 15px; 
            background: #cc0000; /* Deep red button */
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            transition: background 0.3s ease;
        }
        button:hover { 
            background: #ff3333; /* Brighter red on hover */
        }
    </style>
</head>
<body>

    <h2>Support</h2>
    <form id="contactForm">
        <div class="form-group">
            <label for="name">Game name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">Your email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="message">Your problem (Please specify game version if present)</label>
            <textarea id="message" rows="5" required></textarea>
        </div>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Get input values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            // Replace this with your actual Discord Webhook URL
            const webhookUrl = "https://discord.com/api/webhooks/1512061108201193634/htoysvxo0pnRZ3-crQKJGKHIe7zgrmx53LSR92p_y4gdWx5xR1GOIEPEHJzqpolnVtEN";

            // Format the payload as a Discord Embed for structured readability
            const requestData = {
                embeds: [{
                    title: "📬 New Contact Form Submission",
                    color: 16724787, // Changed to a bright Red color code for Discord
                    fields: [
                        { name: "Name", value: name, inline: true },
                        { name: "Email", value: email, inline: true },
                        { name: "Message", value: message }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            // Send data to Discord via fetch API
            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                if (response.ok) {
                    alert("We will email you soon.");
                    document.getElementById('contactForm').reset();
                } else {
                    alert("Something went wrong. Please try again.");
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("An error occurred while sending the message.");
            });
        });
    </script>
</body>
</html>
